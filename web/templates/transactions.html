{% extends "base.html" %}

{% block title %}거래 내역 - AlphaEngine{% endblock %}

{% block content %}
<div class="row mb-3 mb-md-4">
    <div class="col-12 d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2">
        <h2 class="mb-0"><i class="bi bi-list-ul"></i> 거래 내역</h2>
        <div class="btn-group w-100 w-sm-auto" role="group" style="max-width: 280px;">
            <button type="button" class="btn btn-outline-primary btn-sm active" id="filter-venue-futures" data-venue="FUTURES">선물</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="filter-venue-spot" data-venue="SPOT">현물</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="filter-venue-all" data-venue="ALL">모두</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>코인</th>
                        <th>선물/현물</th>
                        <th>시간</th>
                        <th class="text-end">거래</th>
                        <th class="text-end d-none d-sm-table-cell">수수료</th>
                        <th class="text-end">수익</th>
                    </tr>
                </thead>
                <tbody id="transactions-table">
                    <tr>
                        <td colspan="6" class="text-center">로딩 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 페이지네이션 -->
        <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="pagination-info" id="pagination-info">-</div>
            <nav>
                <ul class="pagination mb-0" id="pagination">
                </ul>
            </nav>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/transactions.js"></script>
{% endblock %}
