{% extends "base.html" %}

{% block title %}설정 - AlphaEngine{% endblock %}

{% block content %}
<div class="row mb-3 mb-md-4">
    <div class="col-12">
        <h2 class="mb-0"><i class="bi bi-sliders"></i> 설정</h2>
    </div>
</div>

<div id="configs-container">
    <!-- 로딩 중 -->
    <div class="row" id="configs-loading">
        <div class="col-12 text-center py-4">
            <div class="spinner-border"></div>
            <p class="mt-2 text-muted">로딩 중...</p>
        </div>
    </div>
    <!-- 편집 가능 / 편집 불가 섹션 (로드 후 표시) -->
    <div id="configs-accordion-wrapper" style="display: none;">
        <div class="accordion" id="configs-accordion">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#editable-configs" aria-expanded="true" aria-controls="editable-configs">
                        <i class="bi bi-pencil-square me-2"></i> 편집 가능한 설정 (<span id="editable-count">0</span>개)
                    </button>
                </h2>
                <div id="editable-configs" class="accordion-collapse collapse show" data-bs-parent="#configs-accordion">
                    <div class="accordion-body">
                        <div class="row" id="editable-configs-grid"></div>
                    </div>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#readonly-configs" aria-expanded="false" aria-controls="readonly-configs">
                        <i class="bi bi-lock me-2"></i> 편집 불가 설정 (<span id="readonly-count">0</span>개)
                    </button>
                </h2>
                <div id="readonly-configs" class="accordion-collapse collapse" data-bs-parent="#configs-accordion">
                    <div class="accordion-body">
                        <div class="row" id="readonly-configs-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 설정 편집 모달 -->
<div class="modal fade" id="configModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="configModalTitle">설정 편집</h5>
                <div class="ms-auto me-2">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="json-mode-toggle">
                        <label class="form-check-label small" for="json-mode-toggle">JSON 모드</label>
                    </div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="config-key">
                <input type="hidden" id="config-version">
                
                <!-- Key-Value 편집 모드 -->
                <div id="kv-edit-mode">
                    <div id="config-desc-alert" class="alert alert-info small mb-3" style="display: none;">
                        <i class="bi bi-info-circle me-1"></i>
                        <span id="config-desc-text"></span>
                    </div>
                    <div id="kv-fields-container">
                        <!-- 동적으로 필드가 생성됨 -->
                    </div>
                </div>
                
                <!-- JSON 편집 모드 -->
                <div id="json-edit-mode" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">Value (JSON)</label>
                        <textarea class="form-control font-monospace" id="config-value-json" rows="15"></textarea>
                        <div id="json-error" class="invalid-feedback"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger me-auto" id="delete-btn" onclick="deleteConfig()">
                    <i class="bi bi-trash"></i> 삭제
                </button>
                <span id="changes-indicator" class="text-warning small me-2" style="display: none;">
                    <i class="bi bi-exclamation-circle"></i> 변경됨
                </span>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary" id="save-btn" onclick="saveConfig()">
                    <i class="bi bi-check-lg"></i> 저장
                </button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/config.js"></script>
{% endblock %}
